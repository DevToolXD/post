<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>북마클릿 생성기</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
textarea{width:700px;height:300px;padding:20px;font-size:14px;border:1px solid #eee;outline:none;resize:none;position:absolute;opacity:0}
</style>
</head>
<body>
<textarea id="t" placeholder="fetch 코드 붙여넣고 Enter"></textarea>
<script>
var t=document.getElementById('t');
t.focus();
t.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    e.preventDefault();
    var c=t.value.trim();
    if(!c.startsWith('fetch(')){alert('fetch 코드를 입력하세요');return}
    var s='(function(){var i=0;function r(){if(i>=999999){return}i++;try{var p=eval('+JSON.stringify(c)+');if(p&&p.then){p.then(function(r){return r.json()}).then(function(d){console.log(i,d)}).catch(function(e){console.error(i,e)})}}catch(e){console.error(i,e)}setTimeout(r,1000)}r()})()';
    var b='javascript:'+encodeURIComponent(s.replace(/\n/g,' ').replace(/\s{2,}/g,' '));
    navigator.clipboard.writeText(b).then(function(){t.value='✅ 복사 완료! 북마크에 저장하세요.\n\n'+b;t.style.opacity='1';t.select()}).catch(function(){t.value=b;t.style.opacity='1';t.select()})
  }
});
t.addEventListener('click',function(){t.style.opacity='1';t.focus()});
</script>
</body>
</html>
